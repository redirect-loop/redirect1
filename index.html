<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛑 Close Tab To Stop 🛑</title>

<style>
:root{
    --bg:#070b14;
    --glass:rgba(255,255,255,0.08);
    --glass-border:rgba(255,255,255,0.12);

    --cyan:#00e5ff;
    --purple:#9d4edd;
    --blue:#3a86ff;
    --magenta:#ff4dca;

    --text:#f5f7ff;
    --muted:#a7b0c4;

    --radius:28px;
    --transition:0.35s ease;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    min-height:100%;
}

body{
    font-family:
        Inter,
        SF Pro Display,
        Segoe UI,
        Roboto,
        sans-serif;

    color:var(--text);
    background:var(--bg);
    overflow-x:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
    padding:32px;
}

/* =========================
   Animated Background
========================= */

body::before,
body::after{
    content:"";
    position:fixed;
    inset:-20%;
    z-index:-2;
    filter:blur(120px);
    opacity:.35;
    animation:floatGradient 18s ease-in-out infinite;
}

body::before{
    background:
        radial-gradient(circle at 20% 30%, var(--cyan), transparent 30%),
        radial-gradient(circle at 80% 60%, var(--purple), transparent 35%);
}

body::after{
    background:
        radial-gradient(circle at 70% 20%, var(--magenta), transparent 30%),
        radial-gradient(circle at 30% 80%, var(--blue), transparent 35%);
    animation-delay:-9s;
}

@keyframes floatGradient{
    0%,100%{
        transform:translate(0,0) scale(1);
    }
    50%{
        transform:translate(2%, -2%) scale(1.08);
    }
}

/* subtle grid */

.grid{
    position:fixed;
    inset:0;
    z-index:-1;
    background:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);

    background-size:50px 50px;
    mask-image:radial-gradient(circle at center, black, transparent 95%);
}

/* =========================
   Main Glass Card
========================= */

.container{
    width:min(700px,100%);
    animation:fadeIn 1s ease;
}

.card{
    position:relative;

    background:var(--glass);

    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);

    border:1px solid var(--glass-border);

    border-radius:var(--radius);

    padding:48px;

    box-shadow:
        0 20px 60px rgba(0,0,0,.45),
        0 0 40px rgba(0,229,255,.08),
        0 0 80px rgba(157,78,221,.06);

    overflow:hidden;
}

/* liquid-glass reflection */

.card::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.20),
            rgba(255,255,255,.02) 35%,
            transparent 60%
        );

    pointer-events:none;
}

/* glow ring */

.card::after{
    content:"";
    position:absolute;
    inset:-1px;

    border-radius:inherit;

    padding:1px;

    background:
        linear-gradient(
            135deg,
            var(--cyan),
            var(--purple),
            var(--magenta),
            var(--blue)
        );

    mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

    mask-composite:exclude;
    -webkit-mask-composite:xor;

    opacity:.4;
    pointer-events:none;
}

/* =========================
   Typography
========================= */

.icon{
    font-size:3rem;
    margin-bottom:16px;
}

h1{
    font-size:clamp(1.8rem,4vw,2.8rem);
    font-weight:700;
    margin-bottom:18px;
    letter-spacing:-0.03em;
}

.description{
    color:var(--muted);
    font-size:1.05rem;
    line-height:1.7;
    margin-bottom:28px;
}

/* =========================
   Button
========================= */

.button{
    display:inline-flex;
    align-items:center;
    justify-content:center;

    padding:14px 28px;

    border-radius:16px;

    color:white;
    text-decoration:none;
    font-weight:600;

    background:
        linear-gradient(
            135deg,
            var(--cyan),
            var(--purple)
        );

    box-shadow:
        0 0 25px rgba(0,229,255,.35);

    transition:all var(--transition);

    position:relative;
    overflow:hidden;
}

.button::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,.25),
            transparent
        );

    transform:translateX(-120%);
    transition:0.8s;
}

.button:hover{
    transform:translateY(-3px) scale(1.02);

    box-shadow:
        0 0 35px rgba(0,229,255,.45),
        0 0 70px rgba(157,78,221,.25);
}

.button:hover::before{
    transform:translateX(120%);
}

.button:active{
    transform:translateY(0);
}

/* =========================
   Footer Text
========================= */

.note{
    margin-top:22px;
    color:var(--muted);
    font-size:.92rem;
}

/* =========================
   Animations
========================= */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(24px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media (max-width:768px){

    .card{
        padding:32px 24px;
    }

    .description{
        font-size:1rem;
    }
}
</style>
</head>
<body>

<div class="grid"></div>

<div class="container">
    <div class="card">

        <div class="icon">⚠️</div>

        <h1>Redirect Loop Experiment</h1>

        <p class="description">
            You are now in a loop. Stop the loop by closing pop-ups.
        </p>

        <a
            id="redirect-link"
            class="button"
            href="https://redirect-loop.github.io/redirect1/"
            target="_blank"
            rel="noopener noreferrer"
        >
            Try Again
        </a>

        <p class="note">
            If nothing happens, your browser may have blocked pop-ups.
            Click the button above to continue the experiment.
        </p>

    </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const destination = "https://redirect-loop.github.io/redirect1/";

    // Preserve original behavior
    const newTab = window.open(destination, '_blank');

    if (!newTab || newTab.closed || typeof newTab.closed === 'undefined') {
        document.getElementById('redirect-link').focus();
    }
});
</script>

</body>
</html>
